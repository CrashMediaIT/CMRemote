# Source: CMRemote, clean-room implementation.
#
# cargo-deny configuration for the CMRemote Rust agent workspace.
# Roadmap reference: Track S / S2 — supply-chain CI gates.
#
# Philosophy: fail closed. Unknown licenses, unknown registries, and any
# open RUSTSEC advisory are errors. The allow lists below are intentionally
# narrow; widening them is a review-worthy change, gated by CODEOWNERS on
# this file.
#
# This file is consumed by the `supply-chain` GitHub Actions workflow
# (`.github/workflows/supply-chain.yml`) and by contributors running
# `cargo deny check` locally.

[graph]
# Check the full dependency graph across every target triple the agent
# builds for. Any target-gated dependency still has to satisfy the gates
# below, not just the host triple's subset.
all-features = true
# Windows, Linux, macOS — the three OSes the Rust agent ships on per
# slice R3.
targets = [
    { triple = "x86_64-pc-windows-msvc" },
    { triple = "x86_64-unknown-linux-gnu" },
    { triple = "aarch64-unknown-linux-gnu" },
    { triple = "x86_64-apple-darwin" },
    { triple = "aarch64-apple-darwin" },
]

# ---------------------------------------------------------------------------
# Security advisories (RUSTSEC).
# ---------------------------------------------------------------------------
[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
# Any advisory or yanked crate is a hard failure. Reviewers must either
# upgrade, remove, or add a short-lived, commented `ignore` entry.
yanked = "deny"
# `unmaintained` warnings surface crates that the ecosystem has flagged
# as unmaintained; we treat them as warnings rather than errors because
# some are unavoidable in the short term, but they must be triaged.
unmaintained = "workspace"
ignore = []

# ---------------------------------------------------------------------------
# Licence allow-list.
# ---------------------------------------------------------------------------
[licenses]
# Licences we have explicitly reviewed and accept for dependencies of the
# CMRemote Rust agent. Adding anything to this list is a provenance
# decision; discuss in the PR that adds the dependency.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "CC0-1.0",
    "MPL-2.0",
    # Community Data License Agreement — Permissive 2.0. Used by
    # `webpki-roots`, which embeds Mozilla's CA root certificate set
    # (data, not code). Reviewed and accepted: it is a permissive
    # data licence with no copyleft obligations on the consuming
    # software. See https://cdla.dev/permissive-2-0/.
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.92

# Crates with non-SPDX licence files we have individually reviewed.
# Keep this list empty by default; any addition is a judgement call.
exceptions = []

# ---------------------------------------------------------------------------
# Banned / required crates.
# ---------------------------------------------------------------------------
[bans]
# Duplicate versions bloat the binary and widen the unsafe boundary.
# Surface them as warnings and let the reviewer decide whether to dedupe
# (ideal) or accept the duplicate temporarily.
multiple-versions = "warn"
wildcards = "deny"
# Workspace-internal path deps have no version and are categorized as
# wildcards; allow them so the ban applies only to external crates.
allow-wildcard-paths = true
highlight = "all"

# Crates that must never appear in the graph. Extend as we discover
# ecosystem pitfalls rather than speculating.
deny = [
    # `openssl-sys` pulls in system OpenSSL and complicates cross-compilation.
    # The Rust agent uses `rustls` via `tokio-tungstenite`'s `rustls-*` feature
    # set; we ban `openssl-sys` to prevent an accidental pull-in.
    { name = "openssl-sys", reason = "Use rustls-based TLS, not system OpenSSL." },
    # `ring` has a constrained licence and is not needed once rustls picks
    # `aws-lc-rs` as its default crypto provider on stable. Keep the ban
    # in place so its reintroduction is a deliberate decision.
    { name = "ring", reason = "Prefer aws-lc-rs or rustls-webpki defaults." },
]

# Crates we require to be a single version across the graph, if they
# show up at all. Keep narrow; each entry here is a guarantee we have
# to maintain.
skip = []
skip-tree = []

# ---------------------------------------------------------------------------
# Source allow-list.
# ---------------------------------------------------------------------------
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
# CMRemote fork of `webrtc-rs/dtls` that swaps `ring` for `aws-lc-rs`.
# Pinned by `[patch.crates-io].webrtc-dtls` in `Cargo.toml` per ADR
# 0001 Option B (see `docs/decisions/0001-spike-fork-instructions.md`
# Step 8). The repository URL must match the patch entry exactly —
# `cargo deny check sources` walks the resolved graph, so the URL
# without the trailing `.git` is what shows up here.
allow-git = ["https://github.com/CrashMediaIT/webrtc-cmremote"]
