# Source: CMRemote, clean-room implementation.
#
# Nightly fuzz run. Roadmap reference: Track S / S4 — Fuzzing and
# parser hardening.
#
# Unlike `rust.yml` (per-PR stable tests) and `supply-chain.yml` (per-PR
# dependency gates), this workflow:
#
#   * runs on a schedule, not per-PR, so it does not block merges;
#   * uses a nightly toolchain because `cargo-fuzz` / `libfuzzer-sys`
#     require compiler instrumentation only the nightly channel exposes;
#   * opens a GitHub issue on the first crash in a run so the failure
#     survives the workflow retention window and shows up in the
#     maintainer's inbox the next morning.
#
# Each target is budgeted 15 minutes. The budget is split across all
# targets in the matrix so the whole workflow finishes within a single
# GitHub-hosted job's default timeout regardless of how many targets we
# add later.

name: Fuzz (nightly)

on:
  schedule:
    # 03:17 UTC every day — after the default supply-chain schedule so
    # a newly-introduced dep has had a chance to trip cargo-audit first.
    - cron: "17 3 * * *"
  workflow_dispatch:
    inputs:
      max_total_time:
        description: "Seconds per target (libFuzzer -max_total_time)"
        required: false
        default: "900"

permissions:
  contents: read
  issues: write

jobs:
  fuzz:
    name: fuzz ${{ matrix.target }}
    runs-on: ubuntu-latest
    # Do not block the scheduled workflow's siblings if one target
    # crashes; the `report-crash` step below raises an issue.
    continue-on-error: true
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        target:
          - fuzz_connection_info_json
          - fuzz_hub_envelope_json
          - fuzz_hub_envelope_msgpack
    defaults:
      run:
        working-directory: agent-rs/crates/cmremote-wire/fuzz
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install Rust nightly (required by cargo-fuzz)
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache cargo registry + fuzz build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            agent-rs/crates/cmremote-wire/fuzz/target
          key: fuzz-${{ runner.os }}-${{ matrix.target }}-${{ hashFiles('agent-rs/crates/cmremote-wire/fuzz/Cargo.toml', 'agent-rs/crates/cmremote-wire/**/*.rs') }}
          restore-keys: |
            fuzz-${{ runner.os }}-${{ matrix.target }}-
            fuzz-${{ runner.os }}-

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      - name: Seed corpus from docs/wire-protocol-vectors
        run: |
          set -eux
          case "${{ matrix.target }}" in
            fuzz_connection_info_json)
              mkdir -p "corpus/${{ matrix.target }}"
              cp -n ../../../../docs/wire-protocol-vectors/connection-info/valid/*.json \
                    "corpus/${{ matrix.target }}/" || true
              cp -n ../../../../docs/wire-protocol-vectors/connection-info/invalid/*.json \
                    "corpus/${{ matrix.target }}/" || true
              ;;
            fuzz_hub_envelope_json|fuzz_hub_envelope_msgpack)
              mkdir -p "corpus/${{ matrix.target }}"
              cp -n ../../../../docs/wire-protocol-vectors/envelope/*.json \
                    "corpus/${{ matrix.target }}/" || true
              ;;
          esac

      - name: Run fuzz target
        id: run-fuzz
        env:
          MAX_TOTAL_TIME: ${{ github.event.inputs.max_total_time || '900' }}
        run: |
          set -o pipefail
          # `cargo fuzz run` exits non-zero on a crash; record that so the
          # `report-crash` step can raise an issue even though we let the
          # workflow keep going (continue-on-error above).
          set +e
          cargo +nightly fuzz run "${{ matrix.target }}" \
              -- -max_total_time="${MAX_TOTAL_TIME}" -print_final_stats=1 \
              2>&1 | tee fuzz.log
          status=$?
          set -e
          echo "status=${status}" >> "${GITHUB_OUTPUT}"
          exit 0

      - name: Upload artifacts on crash
        if: steps.run-fuzz.outputs.status != '0'
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-crash-${{ matrix.target }}
          path: |
            agent-rs/crates/cmremote-wire/fuzz/fuzz.log
            agent-rs/crates/cmremote-wire/fuzz/artifacts/${{ matrix.target }}/**

      - name: Open issue on crash
        if: steps.run-fuzz.outputs.status != '0'
        uses: actions/github-script@v7
        env:
          TARGET: ${{ matrix.target }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          script: |
            const target = process.env.TARGET;
            const runUrl = process.env.RUN_URL;
            const title = `fuzz: crash in ${target}`;
            // De-duplicate: if an open issue with this title already exists,
            // just add a comment pointing at this run.
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'fuzz,security',
              per_page: 100,
            });
            const hit = existing.data.find(i => i.title === title);
            const body = [
              `The nightly \`${target}\` fuzz target crashed.`,
              ``,
              `* Workflow run: ${runUrl}`,
              `* Reproducer: download the \`fuzz-crash-${target}\` artifact from the run above, then:`,
              ``,
              '  ```sh',
              `  cd agent-rs/crates/cmremote-wire/fuzz`,
              `  cargo +nightly fuzz run ${target} <path/to/crash-file>`,
              '  ```',
              ``,
              `See \`agent-rs/crates/cmremote-wire/fuzz/README.md\` → *Triaging a crash* for the follow-up workflow.`,
            ].join('\n');
            if (hit) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: hit.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['fuzz', 'security'],
              });
            }

      - name: Fail the job on crash
        if: steps.run-fuzz.outputs.status != '0'
        run: |
          echo "::error::cargo fuzz reported a crash for ${{ matrix.target }} (issue opened)"
          exit 1
