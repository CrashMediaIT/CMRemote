# Source: CMRemote, clean-room implementation.
#
# Supply-chain CI gates. Roadmap reference: Track S / S2.
#
# Runs on every PR touching dependency manifests or this workflow, and on
# a weekly schedule against `main` so that a newly-disclosed advisory
# against an already-merged dependency fails CI within 7 days.

name: Supply chain

on:
  push:
    branches: [main, master]
    paths:
      - "agent-rs/**/Cargo.toml"
      - "agent-rs/Cargo.lock"
      - "agent-rs/deny.toml"
      - "**/*.csproj"
      - "**/packages.lock.json"
      - "Directory.Build.props"
      - ".github/workflows/supply-chain.yml"
      - ".github/dependabot.yml"
  pull_request:
    paths:
      - "agent-rs/**/Cargo.toml"
      - "agent-rs/Cargo.lock"
      - "agent-rs/deny.toml"
      - "**/*.csproj"
      - "**/packages.lock.json"
      - "Directory.Build.props"
      - ".github/workflows/supply-chain.yml"
      - ".github/dependabot.yml"
  schedule:
    # Weekly sweep against `main` so newly-published advisories against
    # already-merged dependencies surface within 7 days.
    - cron: "17 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  cargo-deny:
    name: cargo-deny (${{ matrix.checks }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Run each check class independently so a single failure produces
        # an obvious, individually re-runnable red square in the UI.
        checks:
          - advisories
          - bans
          - licenses
          - sources
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: cargo-deny
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          manifest-path: agent-rs/Cargo.toml
          command: check ${{ matrix.checks }}
          arguments: --all-features

  cargo-audit:
    name: cargo-audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Run cargo-audit
        uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          working-directory: agent-rs

  no-openssl-sys:
    # Slice R7.l/R7.m policy gate. The audit doc
    # (`docs/decisions/0001-webrtc-crate-graph-audit.md` §"Verdict
    # table" → `srtp/` row) requires that `webrtc-srtp` be consumed
    # with default features only so its opt-in `openssl` feature
    # never selects `openssl-sys`. The `[bans].deny` entry on
    # `openssl-sys` in `agent-rs/deny.toml` is the static assertion;
    # this job is the dynamic, post-resolution assertion against the
    # actual lock-file graph for every target triple cargo-deny
    # checks. `cargo tree -i <pkg>` exits non-zero when the package
    # is absent from the resolved graph, which is exactly the
    # success condition we want — we invert with `!`.
    name: no openssl-sys in resolved graph
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Assert openssl-sys is not in the resolved graph
        working-directory: agent-rs
        run: |
          set -euo pipefail
          if cargo tree --workspace --all-features -e normal,build -i openssl-sys >/dev/null 2>&1; then
            echo "::error::openssl-sys is present in the resolved dependency graph."
            echo "This violates the slice R7.l audit's policy gate on webrtc-srtp's opt-in 'openssl' feature."
            echo "See docs/decisions/0001-webrtc-crate-graph-audit.md (Verdict table → srtp/ row)."
            echo "Offending paths:"
            cargo tree --workspace --all-features -e normal,build -i openssl-sys
            exit 1
          fi
          echo "openssl-sys is absent from the resolved graph (expected)."

  dependency-review:
    # GitHub's dependency-review action only runs on pull_request events.
    name: dependency-review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Dependency review
        uses: actions/dependency-review-action@v4
        with:
          # Mirror the Rust licence allow-list from deny.toml for the
          # benefit of non-Rust ecosystems (nuget, docker, actions)
          # which cargo-deny does not see.
          allow-licenses: >-
            MIT,
            Apache-2.0,
            Apache-2.0 WITH LLVM-exception,
            BSD-2-Clause,
            BSD-3-Clause,
            ISC,
            Unicode-3.0,
            Unicode-DFS-2016,
            Zlib,
            CC0-1.0,
            MPL-2.0,
            CDLA-Permissive-2.0
          fail-on-severity: moderate
          comment-summary-in-pr: on-failure
