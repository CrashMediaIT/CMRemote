# Source: CMRemote, clean-room implementation.
#
# OSSF Scorecard — monitors CMRemote's open-source security posture and
# surfaces it as a badge + GitHub code-scanning findings. Roadmap
# reference: Track S / S2.

name: Scorecard supply-chain security

on:
  branch_protection_rule:
  schedule:
    - cron: "43 7 * * 1"
  push:
    branches: [main, master]

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      # Upload findings into the Security tab.
      security-events: write
      # Needed for keyless signing of the results attestation.
      id-token: write
      contents: read
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Run Scorecard
        uses: ossf/scorecard-action@v2.4.0
        with:
          results_file: results.sarif
          results_format: sarif
          # Publish to the public OpenSSF Scorecard API so the README
          # badge resolves. This exposes only the final score + checks,
          # not repo contents.
          publish_results: true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      - name: Upload SARIF to code-scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
